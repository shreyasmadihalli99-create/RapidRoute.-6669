<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Time Restricted</title>
    <style>
        :root {
            --navy-deep: #020617;
            --glass-bg: rgba(15, 23, 42, 0.7);
            --shiny-blue: #38bdf8;
            --text-bright: #f1f5f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--navy-deep);
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(56, 189, 248, 0.1) 0px, transparent 50%);
            color: var(--text-bright);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Highly Aesthetic Shiny Glass Box */
        .aesthetic-container {
            position: relative;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 30px;
            text-align: center;
            width: 90%;
            max-width: 500px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.1), 
                        0 20px 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            z-index: 2;
        }

        /* Shiny Surface Light Streak */
        .aesthetic-container::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent,
                rgba(255, 255, 255, 0.05),
                transparent
            );
            transform: rotate(45deg);
            animation: shine 6s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .order-label {
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--shiny-blue);
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        .time-text {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 25px;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, #38bdf8, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textFlow 4s linear infinite;
        }

        @keyframes textFlow {
            to { background-position: 200% center; }
        }

        .main-msg {
            font-size: 1.1rem;
            color: #94a3b8;
            line-height: 1.7;
            margin-bottom: 30px;
        }

        .note-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed rgba(255, 126, 126, 0.4);
            padding: 15px;
            border-radius: 15px;
        }

        .note-text {
            color: #fda4af;
            font-weight: 500;
            font-size: 0.95rem;
        }

        /* Small popup/tag at the bottom */
        .late-popup {
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: bounce 2s infinite ease-in-out;
            letter-spacing: 1px;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .glow-dot {
            width: 10px;
            height: 10px;
            background: var(--shiny-blue);
            border-radius: 50%;
            margin: 0 auto 15px;
            box-shadow: 0 0 15px var(--shiny-blue);
        }
    </style>
</head>
<body>

    <div class="aesthetic-container">
        <div class="glow-dot"></div>
        <div class="order-label">Order Time</div>
        <div class="time-text">8:00 AM — 10:00 PM</div>
        
        <p class="main-msg">
            Our store is currently resting.<br>
            Website is closed and orders cannot be placed right now.
        </p>

        <div class="note-container">
            <p class="note-text">Note: Sorry, we can't take your order in this time.</p>
        </div>
    </div>

    <div class="late-popup">
        🌙 It's too late.
    </div>

</body>
</html>
