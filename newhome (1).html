<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RapidRoute Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600&display=swap" rel="stylesheet">

<style>
    body {
        margin:0;
        font-family:'Montserrat', sans-serif;
        background: linear-gradient(135deg, #FFE4C4, #FFC38C);
        color:#6B4226;
        min-height:100vh;
        display:flex;
        flex-direction:column;
        overflow-x: hidden; 
    }

    /* Helpline Section Container */
    .helpline-wrapper {
        position: absolute;
        top: 15px;
        right: 50px;
        z-index: 950;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
    }

    /* The Main Blue Button */
    .helpline-btn {
        background-color: #007BFF;
        color: white;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        text-transform: uppercase;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        transition: background 0.3s ease;
    }

    .helpline-btn:hover {
        background-color: #0056b3;
    }

    /* The Hidden Numbers Box */
    #numbers-dropdown {
        display: none; /* Hidden by default */
        background: white;
        margin-top: 8px;
        padding: 10px;
        border-radius: 8px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        border: 1px solid #ddd;
        min-width: 140px;
    }

    .phone-link {
        display: block;
        padding: 8px;
        font-size: 14px;
        color: #007BFF;
        text-decoration: none;
        font-weight: 700;
        text-align: center;
        border-radius: 4px;
    }

    .phone-link:hover {
        background-color: #f0f7ff;
    }

    .phone-link:not(:last-child) {
        border-bottom: 1px solid #eee;
    }

    /* Secret Star */
    .secret-star {
        position: absolute;
        top: 10px;
        right: 15px;
        font-size: 18px;
        color: rgba(107, 66, 38, 0.05);
        cursor: pointer;
        z-index: 1000;
    }

    /* Admin Panel */
    #admin-panel {
        display: none;
        background: #6B4226;
        color: white;
        padding: 12px;
        text-align: center;
        position: sticky;
        top: 0;
        z-index: 999;
    }

    .exit-btn {
        background: #FFC38C;
        border: none;
        padding: 6px 18px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
    }

    header { display:flex; align-items:center; padding: 20px; }
    header img.logo { width:60px; height:60px; margin-right:15px; }
    header h1 { margin: 0; font-size: 24px; }
    header h2 { margin: 0; font-size: 16px; opacity: 0.8; }

    .main {
        display:grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        padding: 15px;
    }

    @media (max-width: 480px) {
        .helpline-wrapper { right: 40px; top: 10px; }
    }
    @media (max-width: 380px) {
        .main { grid-template-columns: 1fr; }
    }

    .hotel-card { background: rgba(255,255,255,0.4); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
    .hotel-card img { width: 100%; height: 140px; object-fit: cover; }
    .hotel-card h3 { margin: 15px; font-size: 15px; text-align: center; }

    .customer-hide { display: none; }
    .admin-mode .customer-hide { display: flex !important; opacity: 0.5; border: 2px dashed #6B4226; }

    .admin-controls-box {
        display: none; 
        background: white;
        padding: 12px;
        justify-content: center;
        align-items: center;
        gap: 10px;
    }

    .status-square { padding: 4px 8px; font-weight: bold; color: white; border-radius: 4px; font-size: 12px; }
    .bg-green { background-color: #28a745; }
    .bg-red { background-color: #dc3545; }

    .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
    .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #6B4226; }
    input:checked + .slider:before { transform: translateX(18px); }
</style>
</head>
<body id="page-body">

    <div class="helpline-wrapper">
        <button class="helpline-btn" onclick="toggleHelpline()">Helpline</button>
        <div id="numbers-dropdown">
            <a href="tel:7899196669" class="phone-link">7899196669</a>
            <a href="tel:9187314267" class="phone-link">9187314267</a>
        </div>
    </div>

    <div class="secret-star" onclick="unlockAdmin()">★</div>

    <div id="admin-panel">
        EDIT MODE Active
        <button class="exit-btn" onclick="lockAdmin()">Save & Exit</button>
    </div>

    <header>
        <img src="rapidroutelogo.png" class="logo" alt="Logo">
        <div class="titles">
            <h1>RapidRoute</h1>
            <h2>Call on the helpline no. before choosing Your Hotel</h2>
        </div>
    </header>

    <main class="main" id="hotel-grid"></main>

    <script>
        // TOGGLE FUNCTION FOR HELPLINE
        function toggleHelpline() {
            const dropdown = document.getElementById('numbers-dropdown');
            if (dropdown.style.display === 'block') {
                dropdown.style.display = 'none';
            } else {
                dropdown.style.display = 'block';
            }
        }

        const hotels = [
            { name: "Raghuveer Café", img: "raghuveer.png", link: "Raghuveer.html" },
            { name: "Raghavendra Vaibhav", img: "ragu.png", link: "Raghavendra.html" },
            { name: "Hotel Pushkar", img: "push.png", link: "Pushkar.html" },
            { name: "Hukkeri Dhaba", img: "hukkeri.png", link: "hukkeri dabha.html" },
            { name: "Hotel Daneshwari", img: "DANESH.PNG", link: "Daneshwari.html" },
            { name: "Cake Mart", img: "cake.png", link: "cake mart.html" }
        ];

        const grid = document.getElementById('hotel-grid');

        hotels.forEach((hotel, index) => {
            const id = index + 1;
            const savedStatus = localStorage.getItem('h-visible-' + id);
            const isOn = (savedStatus === null || savedStatus === 'on');

            const card = document.createElement('div');
            card.className = `hotel-card ${isOn ? '' : 'customer-hide'}`;
            card.id = `card-${id}`;
            card.innerHTML = `
                <a href="${hotel.link}" style="text-decoration:none; color:inherit;">
                    <img src="${hotel.img}" alt="${hotel.name}">
                    <h3>${hotel.name}</h3>
                </a>
                <div class="admin-controls-box" id="admin-box-${id}">
                    <div id="sq-${id}" class="status-square ${isOn ? 'bg-green' : 'bg-red'}">${isOn ? 'ON' : 'OFF'}</div>
                    <label class="switch">
                        <input type="checkbox" id="check-${id}" ${isOn ? 'checked' : ''} onchange="updateVisibility(${id})">
                        <span class="slider"></span>
                    </label>
                </div>
            `;
            grid.appendChild(card);
        });

        function unlockAdmin() {
            let pass = prompt("Enter Secret Code:");
            if (pass === "20106669") {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('page-body').classList.add('admin-mode');
                let controls = document.getElementsByClassName('admin-controls-box');
                for(let c of controls) { c.style.display = 'flex'; }
            } else { alert("Access Denied"); }
        }

        function lockAdmin() {
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('page-body').classList.remove('admin-mode');
            let controls = document.getElementsByClassName('admin-controls-box');
            for(let c of controls) { c.style.display = 'none'; }
        }

        function updateVisibility(id) {
            let isChecked = document.getElementById('check-' + id).checked;
            let card = document.getElementById('card-' + id);
            let square = document.getElementById('sq-' + id);
            
            if (isChecked) {
                card.classList.remove('customer-hide');
                square.innerText = "ON";
                square.className = "status-square bg-green";
                localStorage.setItem('h-visible-' + id, 'on');
            } else {
                card.classList.add('customer-hide');
                square.innerText = "OFF";
                square.className = "status-square bg-red";
                localStorage.setItem('h-visible-' + id, 'off');
            }
        }
    </script>
</body>
</html>
