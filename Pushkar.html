    <style>
        :root {
            --primary: #e5990d;
            --accent: #ff9800;
            --bg: #fffbf5;
            --text: #333;
            --white: #ffffff;
            --gray: #f4f4f4;
            --success: #27ae60;
            --danger: #e74c3c;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Admin Star */
        #admin-star {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            font-size: 20px;
            opacity: 0.05;
            background: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Admin Panel */
        #admin-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 10000;
            padding: 20px;
            overflow-y: auto;
            box-sizing: border-box;
        }

        /* Hero Page */
        #hero-page {
            height: 100vh;
            width: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1585937421612-70a008356fbe?auto=format&fit=crop&w=1500&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 3000;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #hero-page.hidden {
            transform: translateY(-100%);
        }

        .explore-btn {
            margin-top: 25px;
            background: var(--accent);
            color: white;
            padding: 15px 45px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        /* Menu Page */
        #menu-page {
            display: none;
            max-width: 900px;
            margin: 0 auto;
            padding-bottom: 450px;
        }

        .tabs-container {
            position: sticky;
            top: 0;
            background: white;
            display: flex;
            overflow-x: auto;
            padding: 15px;
            gap: 12px;
            z-index: 1000;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            scrollbar-width: none;
        }

        .tabs-container::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: var(--gray);
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            white-space: nowrap;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            transform: scale(1.05);
        }

        .search-container {
            padding: 15px;
            background: white;
            position: sticky;
            top: 65px;
            z-index: 999;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        #menu-search {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid var(--gray);
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }

        .category-header {
            padding: 20px 15px 10px;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            border-bottom: 2px solid var(--accent);
            margin: 10px 15px;
        }

        .menu-item {
            background: white;
            padding: 18px;
            margin: 12px 15px;
            border-radius: 15px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
        }

        .item-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-name { font-weight: 700; font-size: 1.05rem; }
        .item-price { color: var(--primary); font-weight: 800; font-size: 1.1rem; }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
            justify-content: flex-end;
        }

        .qty-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Cart Popup */
        .cart-popup {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            width: 100%;
            max-width: 550px;
            background: white;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            padding: 25px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.2);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 4000;
            box-sizing: border-box;
        }

        .cart-popup.active {
            transform: translateX(-50%) translateY(0);
        }

        .delivery-input {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .charge-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 5px;
        }

        .confirm-btn {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            margin-top: 10px;
        }

            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
    </style>
</head>

    function openAdmin() {
        const pin = prompt("Enter Admin PIN:");
        if (pin === "20106669") {
            const list = document.getElementById('admin-list');
            list.innerHTML = "";
            document.getElementById('admin-panel').style.display = 'block';
            for (let cat in menuData) {
                list.innerHTML += `<div style="background: #f4f4f4; padding: 10px; font-weight: bold; margin-top: 10px;">${cat}</div>`;
                menuData[cat].forEach(item => {
                    const isOff = disabledItems[item.id];
                    list.innerHTML += `
                        <div style="display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee;">
                            <span>${item.name}</span>
                            <button onclick="toggleItem('${item.id}', this)" style="background: ${isOff ? '#e74c3c' : '#27ae60'}; color: white; border: none; padding: 5px 10px; border-radius: 5px;">
                                ${isOff ? 'OFF' : 'ON'}
                            </button>
                        </div>
                    `;
                });
            }
        }
    }

    function toggleItem(id, btn) {
        if (disabledItems[id]) {
            delete disabledItems[id];
            btn.innerText = "ON";
            btn.style.background = "#27ae60";
        } else {
            disabledItems[id] = true;
            btn.innerText = "OFF";
            btn.style.background = "#e74c3c";
        }
        localStorage.setItem('pushkar_status', JSON.stringify(disabledItems));
    }

    function openMenu() {
        document.getElementById('hero-page').classList.add('hidden');
        setTimeout(() => {
            document.getElementById('hero-page').style.display = 'none';
            document.getElementById('menu-page').style.display = 'block';
            renderTabs();
        }, 800);
    }

    function renderTabs() {
        const tabs = document.getElementById('tabs');
        tabs.innerHTML = "";
        Object.keys(menuData).forEach((cat, index) => {
            const btn = document.createElement('button');
            btn.className = "tab-btn" + (index === 0 ? " active" : "");
            btn.innerText = cat;
            btn.onclick = (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                renderItems(cat);
            };
            tabs.appendChild(btn);
        });
        renderItems(Object.keys(menuData)[0]);
    }

    function renderItems(cat) {
        document.getElementById('cat-title').innerText = cat;
        document.getElementById('cat-banner').src = categoryImages[cat] || "";
        const container = document.getElementById('items-container');
        container.innerHTML = "";

        menuData[cat].forEach(item => {
            if (disabledItems[item.id]) return;

            if (item.prices) {
                for (let size in item.prices) {
                    const uniqueId = `${item.id}-${size}`;
                    const price = item.prices[size];
                    container.innerHTML += createItemHTML(uniqueId, `${item.name} (${size})`, price);
                }
            } else {
                container.innerHTML += createItemHTML(item.id, item.name, item.price);
            }
        });
    }

    function createItemHTML(id, name, price) {
        const currentQty = cart[id] ? cart[id].qty : 0;
        return `
            <div class="menu-item" id="item-${id}">
                <div class="item-main">
                    <span class="item-name">${name}</span>
                    <span class="item-price">₹${price}</span>
                </div>
                <div class="qty-controls">
                    <button class="qty-btn" onclick="updateQty('${id}', '${name}', ${price}, -1)">-</button>
                    <span id="qty-${id}" style="font-weight: bold; width: 20px; text-align: center;">${currentQty}</span>
                    <button class="qty-btn" onclick="updateQty('${id}', '${name}', ${price}, 1)">+</button>
                </div>
            </div>
        `;
    }

    function updateQty(id, name, price, change) {
        if (!cart[id]) cart[id] = { name: name, price: price, qty: 0 };
        cart[id].qty += change;
        if (cart[id].qty <= 0) delete cart[id];
        
        const qtyEl = document.getElementById(`qty-${id}`);
        if (qtyEl) qtyEl.innerText = cart[id] ? cart[id].qty : 0;
        
        updateCartPopup();
    }

    function updateCartPopup() {
        const popup = document.getElementById('cart-popup');
        const summary = document.getElementById('cart-summary');
        
        let subtotal = 0;
        let count = 0;
        summary.innerHTML = "";

        for (let id in cart) {
            const itemTotal = cart[id].qty * cart[id].price;
            subtotal += itemTotal;
            count++;
            summary.innerHTML += `
                <div style="display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.9rem; color: #555;">
                    <span>${cart[id].name} x ${cart[id].qty}</span>
                    <span>₹${itemTotal}</span>
                </div>
            `;
        }

        // Logic applied:
        const gst = Math.round(subtotal * 0.05); // 5% GST
        let delivery = 0;
        if (subtotal > 0) {
            if (subtotal < 100) {
                delivery = 15; // Flat 15 if < 100
            } else {
                delivery = Math.round(subtotal * 0.15); // 15% if >= 100
            }
        }

        const grandTotal = subtotal + gst + delivery;

        document.getElementById('sub-total').innerText = subtotal;
        document.getElementById('gst-amount').innerText = gst;
        document.getElementById('delivery-amount').innerText = delivery;
        document.getElementById('grand-total').innerText = grandTotal;
        
        popup.classList.toggle('active', count > 0);
    }

    function filterMenu() {
        const query = document.getElementById('menu-search').value.toLowerCase();
        const items = document.querySelectorAll('.menu-item');
        items.forEach(item => {
            const name = item.querySelector('.item-name').innerText.toLowerCase();
            item.style.display = name.includes(query) ? "block" : "none";
        });
    }

    function submitOrder() {
        const name = document.getElementById('cust-name').value;
        const phone = document.getElementById('cust-phone').value;

        if (!name || !phone) {
            alert("Please provide your name and phone number!");
            return;
        }

        const formData = new URLSearchParams();
        formData.append("hotel", "Hotel Pushkar");
        formData.append("name", name);
        formData.append("phone", phone);
        
        let itemsStr = "";
        for (let id in cart) {
            itemsStr += `${cart[id].name} (Qty: ${cart[id].qty}), `;
        }
        
        formData.append("items", itemsStr);
        formData.append("subtotal", document.getElementById('sub-total').innerText);
        formData.append("gst", document.getElementById('gst-amount').innerText);
        formData.append("delivery", document.getElementById('delivery-amount').innerText);
        formData.append("total", document.getElementById('grand-total').innerText);

        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: formData
        }).then(() => {
            document.getElementById('success-screen').style.display = "flex";
            cart = {};
        });
    }
</script>
