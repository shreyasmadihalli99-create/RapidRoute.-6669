<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cake Mart | Coming Soon</title>
    <style>
        :root {
            --gold: #e5990d;
            --white: #ffffff;
            --dark: #121212;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Optima', 'Didot', 'Playfair Display', serif;
            background-color: var(--dark);
            overflow: hidden; /* Keeps the page still and aesthetic */
        }

        /* --- THE BACKGROUND --- */
        .main-container {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1578985545062-69928b1d9587?q=80&w=2000');
            background-size: cover;
            background-position: center;
            color: var(--white);
        }

        /* --- TYPOGRAPHY --- */
        .brand-name {
            font-size: 4rem;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .status-text {
            font-size: 1.2rem;
            letter-spacing: 4px;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 50px;
            font-style: italic;
        }

        /* --- THE BUTTON --- */
        .back-btn {
            background: transparent;
            color: var(--white);
            border: 1px solid var(--white);
            padding: 15px 40px;
            font-size: 0.85rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-decoration: none; /* Removes underline from link */
            transition: all 0.4s ease;
            cursor: pointer;
        }

        .back-btn:hover {
            background: var(--white);
            color: var(--dark);
        }

        /* Responsive scaling for mobile */
        @media (max-width: 600px) {
            .brand-name { font-size: 2.5rem; letter-spacing: 5px; }
            .status-text { font-size: 1rem; letter-spacing: 2px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1 class="brand-name">Cake Mart</h1>
        
        <p class="status-text">Coming Soon</p>
        
        <a href="newhome (1).html" class="back-btn">Back to Homepage</a>
    </div>

</body>
</html>
