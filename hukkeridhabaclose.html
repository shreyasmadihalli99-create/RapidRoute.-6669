<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cooking in Progress | Hukkeri Dhaba</title>
    <style>
        :root {
            --primary-food: #ff7003; /* Your brand orange */
            --deep-red: #8e0000;
            --cream: #fff9f1;
            --dark: #2d2d2d;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--cream);
            color: var(--dark);
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 90%;
            border-top: 8px solid var(--primary-food);
        }

        .icon-box {
            font-size: 60px;
            margin-bottom: 20px;
            animation: steam 2s infinite ease-in-out;
        }

        @keyframes steam {
            0%, 100% { transform: translateY(0) scale(1); opacity: 1; }
            50% { transform: translateY(-10px) scale(1.1); opacity: 0.8; }
        }

        h1 {
            color: var(--deep-red);
            font-size: 28px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            color: #666;
            margin-bottom: 30px;
        }

        .loader-bar {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .loader-fill {
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary-food), var(--deep-red));
            border-radius: 10px;
            animation: grow 3s infinite alternate;
        }

        @keyframes grow {
            from { width: 30%; }
            to { width: 85%; }
        }

        .back-btn {
            display: inline-block;
            padding: 12px 30px;
            background: var(--primary-food);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 112, 3, 0.3);
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 112, 3, 0.4);
            background: var(--deep-red);
        }

        .footer-tag {
            margin-top: 25px;
            font-size: 12px;
            color: #aaa;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-box">👨‍🍳</div>
        <h1>Hukkeri Dhaba is currently closed !</h1>
        <p>This hotel menu is currently being updated with fresh flavors. We'll be serving here very soon!</p>
        
        <div class="loader-bar">
            <div class="loader-fill"></div>
        </div>

        <a href="newhome (1).html" class="back-btn">GO BACK</a>
        
        <div class="footer-tag">HUKKERI DHABA DELIVERY</div>
    </div>

</body>
</html>
